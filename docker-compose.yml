services:
  postgres:
    image: postgres:16-alpine
    container_name: growly-postgres
    environment:
      POSTGRES_USER: growly
      POSTGRES_PASSWORD: growly
      POSTGRES_DB: growly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U growly -d growly"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./ai-service
    container_name: growly-ai-service
    environment:
      PORT: 4001
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-http://localhost:3000}
      OPENROUTER_X_TITLE: ${OPENROUTER_X_TITLE:-Growly}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS:-1200}
      MASTRA_ENABLED: ${MASTRA_ENABLED:-true}
      MASTRA_MODEL: ${MASTRA_MODEL:-openai/gpt-4o-mini}
    ports:
      - "4001:4001"

  backend:
    build:
      context: ./backend
    container_name: growly-backend
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://growly:growly@postgres:5432/growly?schema=public
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-defina_uma_chave_com_32_ou_mais_caracteres}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3333}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FRONTEND_URL: http://localhost:3000
      AI_SERVICE_URL: http://ai-service:4001
      UPLOAD_DIR: uploads
    ports:
      - "3333:3333"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    container_name: growly-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:3333
      NEXT_PUBLIC_APP_NAME: Growly
    ports:
      - "3000:3000"

volumes:
  postgres_data:
